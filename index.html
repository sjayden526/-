<script>
    const studentData = [
        ["2021542", "李显彬"], ["2021220", "林俊豪"], ["2021374", "谢仪慧"], ["2021598", "蔡婉婷"],
        ["2021415", "林凯炫"], ["2021605", "郑宇翔"], ["2021271", "陈凯胜"], ["2021173", "郑宇"],
        ["2021038", "董梓谊"], ["2021161", "吴善紫"], ["2021301", "廖婉柔"], ["2021151", "谢宛臻"],
        ["2021425", "廖泳韩"], ["2021104", "陈俊元"], ["2021461", "叶颖慧"], ["2021162", "郭恩彤"],
        ["2021049", "韦裔馨"], ["2021328", "朱紫恩"], ["2021454", "黄咏盈"], ["2021512", "黄薏庭"],
        ["2021478", "陈和毅"], ["2021087", "傅品程"], ["2021199", "邱靖铭"], ["2021600", "苏哲正"],
        ["2021413", "杨依璇"], ["2021200", "詹佳蔚"], ["2021152", "徐俊翔"], ["2021590", "邱松昇"],
        ["2021368", "朱嘉媛"], ["2021066", "关宜筠"], ["2021352", "邓宇哲"], ["2021437", "郑皓谦"],
        ["2021366", "戴骏奕"], ["2021083", "洪伟杰"], ["2021381", "尤子睿"], ["2021383", "王伟铭"],
        ["2021367", "吕枘芯"], ["2021117", "陈颖恩"], ["2021279", "林国展"], ["2021553", "李宇泽"]
    ];

    function initGrid() {
        const container = document.getElementById('main-grid');
        for (let i = 0; i < 40; i++) {
            if (i % 2 === 0) {
                const group = document.createElement('div');
                group.className = 'desk-group';
                group.innerHTML = `<div class="seat" id="seat-${i}"></div><div class="seat" id="seat-${i+1}"></div>`;
                container.appendChild(group);
            }
        }
    }

    let revealed = 0;
    let stopFireworks = false;

    function runProtocol() {
        const music = document.getElementById('bgMusic');
        music.play();
        document.getElementById('startBtn').disabled = true;

        // 固定朱紫恩和李宇泽坐在左下角最后一排
        const zhuIdx = 17; // 朱紫恩
        const liIdx = 39;  // 李宇泽

        // 左下角最后一排座位编号
        const fixedSeat1 = 32;
        const fixedSeat2 = 33;

        // 其余座位随机
        const otherSeats = Array.from({ length: 40 }, (_, i) => i)
            .filter(s => s !== fixedSeat1 && s !== fixedSeat2)
            .sort(() => Math.random() - 0.5);

        const order = new Array(40);
        order[zhuIdx] = fixedSeat1; // 朱紫恩坐左边
        order[liIdx] = fixedSeat2;  // 李宇泽坐右边

        let seatPtr = 0;
        for (let i = 0; i < 40; i++) {
            if (i !== zhuIdx && i !== liIdx) {
                order[i] = otherSeats[seatPtr++];
            }
        }

        let currentDelay = 1000;
        order.forEach((seatIndex, i) => {
            const step = 1250 + (Math.random() * 300);
            currentDelay += step;

            if (i === 38) currentDelay += 3500;

            setTimeout(() => {
                const el = document.getElementById(`seat-${seatIndex}`);
                if (el) {
                    el.innerHTML = `<div class="id-row">${studentData[i][0]}</div><div class="name-row">${studentData[i][1]}</div>`;
                    el.classList.add('reveal');
                    revealed++;

                    if (revealed === 40) {
                        fadeOutMusic(music);
                        setTimeout(finish, 800);
                    }
                }
            }, currentDelay);
        });
    }

    function fadeOutMusic(audio) {
        let vol = 1.0;
        const fade = setInterval(() => {
            if (vol > 0.05) { vol -= 0.05; audio.volume = vol; }
            else { audio.pause(); clearInterval(fade); }
        }, 100);
    }

    function finish() {
        const canvasEl = document.getElementById('fireworks-canvas');
        document.getElementById('fireworkSound').play();
        document.getElementById('applauseSound').play();
        document.getElementById('final-text').style.display = 'block';

        stopFireworks = false;
        startFireworks();

        setTimeout(() => {
            document.getElementById('final-text').classList.add('fade-out');
            canvasEl.style.opacity = '0';
            setTimeout(() => {
                stopFireworks = true;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 2000);
        }, 8000);
    }

    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function startFireworks() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; loop(); }
    function loop() {
        if (stopFireworks) return;
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (Math.random() < 0.3) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.4;
            const col = `hsl(0, 0%, ${Math.random() * 20}%)`;
            for (let i = 0; i < 30; i++) pts.push({ x, y, vx: (Math.random() - 0.5) * 18, vy: (Math.random() - 0.5) * 18, a: 1, c: col });
        }
        pts.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.a -= 0.025;
            if (p.a <= 0) pts.splice(i, 1);
            else {
                ctx.globalAlpha = p.a;
                ctx.fillStyle = p.c;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, 7);
                ctx.fill();
            }
        });
    }
    initGrid();
</script>
